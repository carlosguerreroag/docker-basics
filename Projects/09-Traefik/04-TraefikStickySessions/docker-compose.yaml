services:
  traefik:
    image: traefik:3.7.8
    container_name: traefik
    restart: always
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
    ports:
      - 80:80   # entrypoint web
      - 443:443  # entrypoint websecure
      # - 8080:8080 # dashboard insecure
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: 1

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yaml:/traefik.yaml:ro

    labels:
      - "traefik.enable=true" # Enabled because dashboard
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik-dashboard.localhost`)" # Creates a http router for traefik-dashboard listening to traefik-dashboard.localhost Host header requests
      - "traefik.http.routers.traefik-dashboard.service=api@internal" # Directs the router to Traefik's internal Dashboard handler instead of an external container
      - "traefik.http.routers.traefik-dashboard.entrypoints=web" # Router listens to "web" entrypoint only

  web1:
    image: ealen/echo-server:latest
    deploy:
      replicas: 2
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 3s
      timeout: 2s
      retries: 2
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web1.rule=Host(`web1.localhost`)"
      - "traefik.http.routers.web1.entrypoints=web" # Router listens to "web" entrypoint only
      - "traefik.http.services.web1.loadbalancer.server.port=80" 
      - "traefik.http.services.web1.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.web1.loadbalancer.healthcheck.interval=2s"

      # 1. Enable session cookies 
      - "traefik.http.services.web1.loadbalancer.sticky.cookie=true"

      # 2. Protect sticky cookie from XSS and other stuff
      - "traefik.http.services.web1.loadbalancer.sticky.cookie.httpOnly=true"

      # 3. Set sticky cookie custom name
      - "traefik.http.services.web1.loadbalancer.sticky.cookie.name=web1_sticky_cookie"

  web2:
    image: ealen/echo-server:latest
    deploy:
      replicas: 2
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 3s
      timeout: 2s
      retries: 2
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web2.rule=Host(`web2.localhost`)"
      - "traefik.http.routers.web2.entrypoints=web" # Router listens to "web" entrypoint only
      - "traefik.http.services.web2.loadbalancer.server.port=80" 
      - "traefik.http.services.web2.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.web2.loadbalancer.healthcheck.interval=2s"

      # -- sticky --
      - "traefik.http.services.web2.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.web2.loadbalancer.sticky.cookie.httpOnly=true"
      - "traefik.http.services.web2.loadbalancer.sticky.cookie.name=web2_sticky_cookie"

networks:
  traefik: