services:
  traefik:
    image: traefik:3.7.8
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik
    ports:
      - 80:80   # entrypoint web
      - 443:443  # entrypoint websecure
      # - 8080:8080 # dashboard insecure
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: 1

    volumes:
      # Zona horaria del host para que los logs tengan hora local
      - /etc/localtime:/etc/localtime:ro

      # Socket de Docker → Traefik lo usa para descubrir contenedores y sus labels
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # Configuración ESTÁTICA de Traefik (entrypoints, providers, certificados, logs, api)
      - ./config/traefik.yaml:/traefik.yaml:ro

    labels:
      - "traefik.enable=true" # Enabled because dashboard
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik-dashboard.localhost`)" # Creates a http router for traefik-dashboard listening to traefik-dashboard.localhost Host header requests

      # Binds the router to Traefik's native internal Dashboard service
      - "traefik.http.routers.traefik-dashboard.service=api@internal" # Directs the router to Traefik's internal Dashboard handler instead of an external container


      - "traefik.http.routers.traefik-dashboard.entrypoints=web" # Router listens to "web" entrypoint only

  web1:
    image: traefik/whoami
    container_name: web1
    networks:
      - traefik
    labels:
      - "traefik.enable=true" # enable traefik on this container
      - "traefik.http.routers.web1.rule=Host(`web1.localhost`)" # Creates a http router for web1, assigned only to web.localhost Host header
      - "traefik.http.routers.web1.entrypoints=web" # Router listens to "web" entrypoint only

  web2:
    image: traefik/whoami
    container_name: web2
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web2.rule=Host(`web2.localhost`)"
      - "traefik.http.routers.web2.entrypoints=web"

networks:
  traefik:
